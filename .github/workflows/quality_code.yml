on: [workflow_call]

jobs:
  quality_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm, node and dependencies
        uses: pnpm/setup@v1
        with:
          runtime: node@24

      - name: Verify code linting and typechecking
        run: pnpm run tool:code
